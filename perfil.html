<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Perfil</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --primary1:#6A11CB;
  --primary2:#8E2DE2;
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#1f1f1f;
  --sub:#6b6b6b;
  --line:#f0f0f0;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter','Segoe UI',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
background:linear-gradient(135deg,var(--primary1),var(--primary2));
  padding:20px 20px 20px;
  color:#fff;
  position:relative;
}

.header-top{
  display:flex;
  align-items:center;
  font-size:18px;
  font-weight:600;
}

.header-top i{
  margin-right:18px;
  cursor:pointer;
}

/* PROFILE CARD */
.profile-card{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-45px;
  width:90%;
  max-width:420px;
  background:#fff;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  padding:20px;
  display:flex;
  align-items:center;
}

.profile-avatar{
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--primary1),var(--primary2));
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:20px;
  margin-right:15px;
}

.profile-info h4{
  font-size:16px;
  font-weight:600;
}

.profile-info p{
  font-size:13px;
  color:var(--sub);
  margin-top:4px;
}

/* CONTENT */
.content{
  margin-top:30px;
}

/* SECTION */
.section{
  margin-top:28px;
}

.section-title{
  font-size:12px;
  font-weight:600;
  color:var(--sub);
  padding:0 20px 10px;
  letter-spacing:.8px;
}

/* CARD */
.card{
  background:var(--card);
  margin:0 16px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
  overflow:hidden;
}

/* ITEM */
.item{
  display:flex;
  align-items:center;
  padding:15px 18px;
  font-size:14.8px;
  transition:.2s ease;
  cursor:pointer;
}

.item + .item{
  border-top:1px solid var(--line);
}

.icon-box{
  width:36px;
  height:36px;
  border-radius:10px;
  background:#f3eaff;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:15px;
  color:var(--primary2);
  font-size:15px;
}

.item:hover{
  background:#fafafa;
  transform:translateX(4px);
}

a{
  text-decoration:none;
  color:inherit;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  visibility:hidden;
  transition:.3s ease;
}

.modal{
  background:#fff;
  width:88%;
  max-width:340px;
  border-radius:20px;
  padding:25px;
  text-align:center;
  transform:scale(.9);
  transition:.3s ease;
}

.modal h3{
  font-size:16px;
  margin-bottom:10px;
}

.modal p{
  font-size:13.5px;
  color:var(--sub);
  margin-bottom:18px;
}

.modal button{
  background:linear-gradient(135deg,var(--primary1),var(--primary2));
  border:none;
  padding:10px 20px;
  border-radius:10px;
  color:#fff;
  font-size:13px;
  cursor:pointer;
}

.modal-overlay.active{
  opacity:1;
  visibility:visible;
}

.modal-overlay.active .modal{
  transform:scale(1);
}
</style>
</head>

<body>

function mostrarModal(){

}
function cerrarModal(){
  document.getElementById("modal").classList.remove("active");
}
