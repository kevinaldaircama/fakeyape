<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enviar Saldo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#720e9e">
<link rel="icon" type="image/png" href="imagen/app_icon_xxxhdpi.png">
  <style>

:root{
--bg1:#141e30;
--bg2:#243b55;
--glass:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.2);
--primary:#00c6ff;
--primary2:#0072ff;
--success:#00c853;
}

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui,-apple-system,Arial,sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
padding:20px;
}

/* CARD */

.card{
background:var(--glass);
padding:28px;
border-radius:18px;
width:100%;
max-width:380px;
backdrop-filter:blur(14px);
border:1px solid var(--border);
box-shadow:
0 10px 30px rgba(0,0,0,0.4),
inset 0 0 10px rgba(255,255,255,0.05);
position:relative;
overflow:hidden;
animation:fadeIn .4s ease;
}

/* TITULO */

.card h2{
text-align:center;
margin-bottom:10px;
font-weight:600;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.15);
color:white;
font-size:15px;
outline:none;
transition:.25s;
}

input::placeholder{
color:#ddd;
}

input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(0,198,255,0.3);
background:rgba(255,255,255,0.2);
}

/* BOTON */

button{
width:100%;
padding:12px;
margin-top:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:.25s;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button:hover{
transform:translateY(-2px) scale(1.02);
box-shadow:0 8px 18px rgba(0,0,0,0.4);
}

button:active{
transform:scale(.97);
}

/* INFO USUARIO */

.usuarioInfo{
margin-top:15px;
padding:12px;
background:rgba(0,0,0,0.35);
border-radius:12px;
display:none;
transition:.3s;
border:1px solid rgba(255,255,255,0.1);
}

/* MENSAJE */

#mensaje{
margin-top:10px;
color:#ffd54f;
font-size:14px;
text-align:center;
}

/* SUCCESS SCREEN */

.success{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#00c853,#00e676);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transform:translateY(-100%);
transition:.5s;
text-align:center;
}

.success.active{
transform:translateY(0);
}

.success h2{
margin:0;
font-size:24px;
}

.success p{
opacity:.9;
margin-top:5px;
}

/* ANIMACION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* RESPONSIVE */

@media (max-width:400px){

.card{
padding:22px;
}

}

  </style>
</head>
<body>

<div class="card" id="card">
  <h2>💸 Enviar Saldo</h2>

  <!-- Paso 1: Teléfono -->
  <div id="paso1">
    <input type="tel" id="telefono" placeholder="Número de teléfono">
    <button onclick="siguiente()">Siguiente</button>
    <p id="mensaje"></p>
  </div>

  <!-- Paso 2: Monto -->
  <div class="usuarioInfo" id="usuarioInfo">
    <p><strong>Nombre:</strong> <span id="nombre"></span></p>
    <input type="number" id="montoEnviar" placeholder="Monto a enviar">
    <button onclick="enviar()">Enviar</button>
    <p id="mensajeMonto"></p>
  </div>

  <div class="success" id="success">
    <h2>✅ Saldo Enviado</h2>
    <p>Transferencia realizada con éxito</p>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  query, 
  where, 
  getDocs, 
  doc, 
  runTransaction,
  addDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVvEXCUiCPB5RmAVVWfmce2x-FALLDL0c",
    authDomain: "roddoxes.firebaseapp.com",
    databaseURL: "https://roddoxes-default-rtdb.firebaseio.com",  
    projectId: "roddoxes",
    storageBucket: "roddoxes.firebasestorage.app",
    messagingSenderId: "688697487472",
    appId: "1:688697487472:web:7e3d19b907ae330dda04b5",
    measurementId: "G-0DLHHJRSFP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarioDestino = null;

// 🔎 Paso 1: Buscar usuario y mostrar paso 2
window.siguiente = async function() {
  const telefono = document.getElementById("telefono").value.trim();
  const mensaje = document.getElementById("mensaje");
  mensaje.innerText = "";
  usuarioDestino = null;

  if (!telefono) {
    mensaje.innerText = "Ingresa un número";
    return;
  }

  const q = query(collection(db,"usuarios"), where("telefono","==",telefono));
  const snapshot = await getDocs(q);

  if(snapshot.empty){
    mensaje.innerText = "Usuario no encontrado";
    return;
  }

  snapshot.forEach(docu => {
    usuarioDestino = { id: docu.id, ...docu.data() };
  });

  // Mostrar paso 2
  document.getElementById("nombre").innerText = usuarioDestino.nombre;
  document.getElementById("paso1").style.display = "none";
  document.getElementById("usuarioInfo").style.display = "block";
  document.getElementById("montoEnviar").focus();
};

// 💸 Paso 2: Enviar saldo
window.enviar = async function() {
  const montoInput = document.getElementById("montoEnviar");
  const monto = parseFloat(montoInput.value);
  const mensajeMonto = document.getElementById("mensajeMonto");
  mensajeMonto.innerText = "";

  if(!monto || monto <= 0){
    mensajeMonto.innerText = "Monto inválido";
    return;
  }

  const user = auth.currentUser;
  if(!user){
    mensajeMonto.innerText = "Debes iniciar sesión";
    return;
  }

  if(!usuarioDestino){
    mensajeMonto.innerText = "Usuario inválido";
    return;
  }

  if(user.uid === usuarioDestino.id){
    mensajeMonto.innerText = "No puedes enviarte dinero a ti mismo";
    return;
  }

  const remitenteRef = doc(db,"usuarios",user.uid);
  const destinoRef = doc(db,"usuarios",usuarioDestino.id);

  try {
    // Bloquear UI mientras transacción ocurre
    montoInput.disabled = true;

    await runTransaction(db, async (transaction) => {
      const remitenteSnap = await transaction.get(remitenteRef);
      const destinoSnap = await transaction.get(destinoRef);

      if(!remitenteSnap.exists()) throw "Remitente no existe";
      if(!destinoSnap.exists()) throw "Destino no existe";

      const remitenteData = remitenteSnap.data();
      const destinoData = destinoSnap.data();

      if(monto > remitenteData.monto){
        throw "Saldo insuficiente";
      }

      transaction.update(remitenteRef, {
        monto: remitenteData.monto - monto
      });

      transaction.update(destinoRef, {
        monto: destinoData.monto + monto
      });
    });

    // Guardar historial
    await addDoc(collection(db,"transferencias"),{
      deUid: user.uid,
      paraUid: usuarioDestino.id,
      monto: monto,
      fecha: new Date(),
      estado: "exitosa"
    });

    // Mostrar éxito
    const success = document.getElementById("success");
    success.classList.add("active");

    setTimeout(()=>{
      success.classList.remove("active");
      // Reset card
      document.getElementById("paso1").style.display="block";
      document.getElementById("usuarioInfo").style.display="none";
      document.getElementById("telefono").value="";
      document.getElementById("montoEnviar").value="";
      montoInput.disabled = false;
    },2000);

  } catch(error){
    mensajeMonto.innerText = "Error: " + error;
    montoInput.disabled = false;
  }
};
</script>

</body>
</html>
